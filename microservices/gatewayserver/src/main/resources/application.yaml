server:
  port: ${PORT_GATEWAYSERVER:8901}

spring:
  application:
    name: gatewayserver
  config:
    # Points to the 'configserver' service name defined in docker-compose
    import: "optional:configserver:http://configserver:${PORT_CONFIGSERVER:8801}"
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false #disables automatic routing , only manually added routes are redirected
          lowerCaseServiceId: true
      httpclient:
        connect-timeout: 1000
        response-timeout: 12s
  data:
    redis:
      connect-timeout: 2s
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 1s
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

logging:
  level:
    com:
      eazybytes:
        accounts: DEBUG
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
      access: unrestricted
  info:
    env:
      enabled: true
  metrics:
    logs:
      application: ${spring.application.name}
  health:
    circuitbreakers:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8070/eureka/}

info:
  app:
    name: "gateway-server"
    description: "API Gateway/ Edge Server"
    version: "1.0.0"

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      permittedNumberPfCallsInHalfOpenState: 2
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      registerHealthIndicator: true
