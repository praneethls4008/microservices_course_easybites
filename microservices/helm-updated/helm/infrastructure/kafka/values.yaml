name: kafka
image: apache/kafka:4.1.1

# Pod-level security — fixes "Permission Denied" on /var/lib/kafka/data PVC
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

persistence:
  enabled: true
  name: data
  size: 500Mi
  accessMode: ReadWriteOnce

# FIXED: Standard Kubernetes container ports list
ports:
  - name: external
    containerPort: 8902
  - name: internal
    containerPort: 29092
  - name: controller
    containerPort: 29093

env:
  - name: KAFKA_NODE_ID
    value: "1"
  - name: KAFKA_PROCESS_ROLES
    value: "broker,controller"

  # Listen on all interfaces
  - name: KAFKA_LISTENERS
    value: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:8902"

  # How other services reach Kafka (headless DNS + ClusterIP service name)
  - name: KAFKA_ADVERTISED_LISTENERS
    value: "PLAINTEXT://kafka-0.kafka:29092,PLAINTEXT_HOST://kafka:8902"

  # FIX: Use localhost for quorum — avoids DNS "chicken and egg" on first boot
  - name: KAFKA_CONTROLLER_QUORUM_VOTERS
    value: "1@localhost:29093"

  - name: KAFKA_CONTROLLER_LISTENER_NAMES
    value: "CONTROLLER"
  - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
    value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
  - name: KAFKA_INTER_BROKER_LISTENER_NAME
    value: "PLAINTEXT"
  - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
    value: "1"
  - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
    value: "0"
  - name: KAFKA_LOG_DIRS
    value: "/var/lib/kafka/data"
  - name: CLUSTER_ID
    value: "MkU3OEVBNTcwNTJENDM2Qk"

volumeMounts:
  - name: data
    mountPath: /var/lib/kafka/data

# FIX: tcpSocket probes — apache/kafka:4.1.1 is distroless (no nc/sh)
readinessProbe:
  tcpSocket:
    port: 8902
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  tcpSocket:
    port: 8902
  initialDelaySeconds: 120
  periodSeconds: 20

service:
  # Headless = enables DNS: kafka-0.kafka for the controller quorum
  headless: true
  ports:
    - name: external
      port: 8902
      targetPort: 8902
    - name: internal
      port: 29092
      targetPort: 29092
    - name: controller
      port: 29093
      targetPort: 29093