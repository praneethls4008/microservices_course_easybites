name: kafka
image: apache/kafka:4.1.1

storage: 500Mi
persistence:
  enabled: true
  name: data
  size: 500Mi
  accessMode: ReadWriteOnce
ports:
  - 8902
  - 29092
  - 29093

env:
  - name: KAFKA_NODE_ID
    value: "1"
  - name: KAFKA_PROCESS_ROLES
    value: "broker,controller"
  # Use the pod-specific hostname for internal listeners in a StatefulSet
  - name: KAFKA_LISTENERS
    value: "PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:8902"
  - name: KAFKA_ADVERTISED_LISTENERS
    value: "PLAINTEXT://kafka-0.kafka:29092,PLAINTEXT_HOST://kafka:8902"
  - name: KAFKA_CONTROLLER_QUORUM_VOTERS
    value: "1@kafka-0.kafka:29093"
  - name: KAFKA_CONTROLLER_LISTENER_NAMES
    value: "CONTROLLER"
  - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
    value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
  - name: KAFKA_INTER_BROKER_LISTENER_NAME
    value: "PLAINTEXT"
  - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
    value: "1"
  - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
    value: "1"
  - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
    value: "0"
  - name: KAFKA_LOG_DIRS
    value: "/var/lib/kafka/data"
  - name: CLUSTER_ID
    value: "MkU3OEVBNTcwNTJENDM2Qk"

volumeMounts:
  - name: data
    mountPath: /var/lib/kafka/data

readinessProbe:
  exec:
    command: ["sh", "-c", "nc -z localhost 8902"]
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  exec:
    command: ["sh", "-c", "nc -z localhost 8902"]
  initialDelaySeconds: 60
  periodSeconds: 15

service:
  type: ClusterIP
  ports:
    - name: external
      port: 8902
      targetPort: 8902
    - name: internal
      port: 29092
      targetPort: 29092
    - name: controller
      port: 29093
      targetPort: 29093