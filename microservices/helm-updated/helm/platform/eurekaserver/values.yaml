name: eurekaserver

image: myapp/eurekaserver:1.0.1
replicaCount: 1

ports:
  - 8761

# Replace Docker depends_on
initContainers:
  - name: wait-for-configserver
    image: busybox
    command:
      - sh
      - -c
      - until nc -z configserver 8801; do echo waiting for configserver; sleep 2; done;

env:
  - name: SPRING_APPLICATION_NAME
    value: "eurekaserver"

  - name: OTEL_SERVICE_NAME
    value: "eurekaserver"

# Docker healthcheck -> K8s probes
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8761
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8761
  initialDelaySeconds: 60
  periodSeconds: 20

resources:
  requests:
    memory: "300Mi"
    cpu: "200m"
  limits:
    memory: "700Mi"
    cpu: "500m"

service:
  type: ClusterIP
  ports:
    - port: 8761
      targetPort: 8761