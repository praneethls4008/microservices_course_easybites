global:

  rabbitmq:
    host: rabbitmq

  otel:
    endpoint: http://tempo:4318
    javaAgent: "-javaagent:/app/libs/opentelemetry-javaagent.jar"

  spring:
    profile: default   # overridden to "dev" by environments/dev.yaml

  ports:
    configserver: 8801

  eureka:
    hostname: eurekaserver
    url: http://eurekaserver:8761/eureka/

# ── Secret defaults (overridable per environment) ────────────────────────────
# For production, swap these out with sealed-secrets or an external vault.
globalSecrets:
  mysql:
    rootPassword: "root"
  keycloak:
    dbPassword: "keycloak"
    adminPassword: "admin"
