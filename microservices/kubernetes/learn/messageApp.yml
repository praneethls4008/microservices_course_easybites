apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-ms
  labels:
    app: message
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message
  template:
    metadata:
      labels:
        app: message
    spec:
      containers:
        - name: message-ms
          image: myapp/message:1.0.1
          ports:
            - containerPort: 40004 # Replace with your actual ${PORT_MESSAGE} value
          env:
            - name: SPRING_APPLICATION_NAME
              value: "message"
          # If your app needs to talk to observability tools (Prometheus/Tempo),
          # you would define their internal K8s service addresses here.
          resources:
            requests:
              memory: "250Mi"
              cpu: "150m"
            limits:
              memory: "1Gi"
              cpu: "300m"

---
apiVersion: v1
kind: Service
metadata:
  name: message-service
spec:
  selector:
    app: message
  ports:
    - protocol: TCP
      port: 80         # The port you'll use to call the service internally
      targetPort: 40004 # Must match the containerPort above
  type: ClusterIP      # Standard internal communication