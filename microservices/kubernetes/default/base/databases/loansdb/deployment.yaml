apiVersion: apps/v1
kind: Deployment
metadata:
  name: loansdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loansdb
  template:
    metadata:
      labels:
        app: loansdb
    spec:
      containers:
        - name: mysql
          image: mysql:8.0

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_DATABASE
              value: "loansdb"

            # ⚠️ REQUIRED
            - name: MYSQL_ROOT_PASSWORD
              value: "root"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 40
            periodSeconds: 20

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: loansdb-pvc