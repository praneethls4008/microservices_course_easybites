apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts
  template:
    metadata:
      labels:
        app: accounts
    spec:
      containers:
        - name: accounts
          image: myapp/accounts:1.0.1

          ports:
            - containerPort: 40001

          env:
            - name: SPRING_APPLICATION_NAME
              value: "accounts"

            - name: OTEL_SERVICE_NAME
              value: "accounts"

            # 🔹 DB Connection
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://accountsdb:3306/accountsdb"

            - name: SPRING_DATASOURCE_USERNAME
              value: "root"

            - name: SPRING_DATASOURCE_PASSWORD
              value: "root"

            # 🔹 Kafka
            - name: SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
              value: "kafka:8902"

            #           rabbit mq (common)
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: RABBITMQ_HOST

            #            OPEN TELEMETRY (COMMON)
            - name: JAVA_TOOL_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: OPEN_TEL_JAR_PATH

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT # Secure password

            - name: OTEL_METRICS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: OTEL_METRICS_EXPORTER

            - name: OTEL_LOGS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: OTEL_LOGS_EXPORTER

            #           Microservices (Common)
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: PROFILES_ACTIVE

            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: SPRING_CONFIG_IMPORT

            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: EUREKA_DEFAULT_ZONE_URL

            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: EUREKA_INSTANCE_PREFER_IP_ADDRESS

            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: global-config
                  key: EUREKA_INSTANCE_HOSTNAME

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 40001
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 40001
            initialDelaySeconds: 40
            periodSeconds: 20