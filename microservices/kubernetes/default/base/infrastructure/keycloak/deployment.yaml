apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak

spec:
  replicas: 1

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.3

          args: ["start-dev"]

          ports:
            - containerPort: 8080

          env:
            - name: KC_DB
              value: postgres

            - name: KC_DB_URL_HOST
              value: postgres

            - name: KC_DB_URL_DATABASE
              value: keycloak

            - name: KC_DB_USERNAME
              value: keycloak

            - name: KC_DB_PASSWORD
              value: keycloak

            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: global-secret
                  key: KEYCLOAK_ADMIN

            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: global-secret
                  key: KEYCLOAK_ADMIN_PASSWORD

            - name: KC_HOSTNAME
              value: keycloak

            - name: KC_PROXY
              value: edge