apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - config/configmap.yaml
  - config/secret.yaml

  # Infrastructure
  - infrastructure/kafka
  - infrastructure/rabbitmq
  - infrastructure/redis
  - infrastructure/postgres
  - infrastructure/keycloak

  # Databases
  - databases/accountsdb
  - databases/cardsdb
  - databases/loansdb

  # Platform
  - platform/configserver
  - platform/eurekaserver
  - platform/gatewayserver

  # Microservices
  - microservices/accounts
  - microservices/cards
  - microservices/loans
  - microservices/message