apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true

    jsonData:
      # The trace_id and span_id are now stored as structured
      # metadata fields by Alloy, so we match them directly from the JSON
      # body instead.
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          datasourceUid: "tempo"
          url: '${__value.raw}'

        - name: SpanID
          matcherRegex: '"span_id":"([a-f0-9]+)"'
          datasourceUid: "tempo"
          url: '${__value.raw}'
