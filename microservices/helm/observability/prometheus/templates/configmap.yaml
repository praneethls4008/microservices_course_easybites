apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval:     5s
      evaluation_interval: 5s

    scrape_configs:

      - job_name: 'accounts'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['accounts:40001']

      - job_name: 'cards'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['cards:40002']

      - job_name: 'loans'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['loans:40003']

      - job_name: 'gatewayserver'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['gatewayserver:8901']

      - job_name: 'eurekaserver'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['eurekaserver:8761']

      - job_name: 'configserver'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['configserver:8801']
