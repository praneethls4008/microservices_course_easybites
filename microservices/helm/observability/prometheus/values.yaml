name: prometheus
skipGlobalEnv: true
image: prom/prometheus:v2.51.0
replicaCount: 1

# Prometheus CLI args
args:
  - "--config.file=/etc/prometheus/prometheus.yml"
  - "--storage.tsdb.path=/prometheus"
  - "--web.console.libraries=/usr/share/prometheus/console_libraries"
  - "--web.console.templates=/usr/share/prometheus/consoles"

ports:
  - 9090

podAnnotations:
  prometheus.io/scrape: "false"   # don't scrape prometheus itself via autodiscovery

readinessProbe:
  httpGet:
    path: /-/ready
    port: 9090
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /-/healthy
    port: 9090
  initialDelaySeconds: 20
  periodSeconds: 15

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Mount the prometheus.yml ConfigMap
volumeMounts:
  - name: config
    mountPath: /etc/prometheus/prometheus.yml
    subPath: prometheus.yml

volumes:
  - name: config
    configMap:
      name: prometheus-config

service:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
