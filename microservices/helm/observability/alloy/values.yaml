name: alloy
skipGlobalEnv: true
image: grafana/alloy:v1.7.5
replicaCount: 1
serviceAccountName: alloy

# Force root user to ensure permission to read /var/log/pods
securityContext:
  runAsUser: 0

args:
  - run
  - /etc/alloy/config.alloy

volumeMounts:
  - name: config
    mountPath: /etc/alloy/config.alloy
    subPath: config.alloy
  # --- FIX: ADD THIS MOUNT ---
  - name: pod-logs
    mountPath: /var/log/pods
    readOnly: true

volumes:
  - name: config
    configMap:
      name: alloy-config
  # --- FIX: ADD THIS VOLUME ---
  - name: pod-logs
    hostPath:
      path: /var/log/pods

readinessProbe:
  httpGet:
    path: /-/ready
    port: 12345
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /-/healthy
    port: 12345
  initialDelaySeconds: 20
  periodSeconds: 15

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"

# Alloy HTTP UI — useful for debugging the pipeline
service:
  type: ClusterIP
  ports:
    - port: 12345
      targetPort: 12345
