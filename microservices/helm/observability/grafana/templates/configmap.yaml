apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

  loki.yml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        editable: true
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"trace_id":"([a-f0-9]+)"'
              datasourceUid: "tempo"
              url: '${__value.raw}'
            - name: SpanID
              matcherRegex: '"span_id":"([a-f0-9]+)"'
              datasourceUid: "tempo"
              url: '${__value.raw}'

  tempo.yml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3100
        access: proxy
        editable: true
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: 'prometheus'
          tracesToLogsV2:
            datasourceUid: 'loki'
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: true
            filterBySpanID: false
            customQuery: true
            # Updated for K8s: job="kubernetes" (was "docker" in docker-compose)
            query: '{job="kubernetes"} | trace_id = "${__trace.traceId}"'
          tracesToMetrics:
            datasourceUid: 'prometheus'
