name: redis

image: redis:7-alpine
replicaCount: 1

storage: 500Mi
persistence:
  enabled: true
  name: data
  size: 500Mi
  accessMode: ReadWriteOnce
ports:
  - 6379

# 🔥 command from docker-compose
command:
  - redis-server
  - "--appendonly"
  - "yes"

volumeMounts:
  - name: data
    mountPath: /data

# ✅ healthcheck → probes
readinessProbe:
  exec:
    command:
      - redis-cli
      - ping
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 10

livenessProbe:
  exec:
    command:
      - redis-cli
      - ping
  initialDelaySeconds: 20
  periodSeconds: 10

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "300Mi"
    cpu: "300m"

service:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379