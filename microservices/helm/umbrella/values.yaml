global:

  rabbitmq:
    host: rabbitmq

  otel:
    endpoint: http://tempo:4318
    javaAgent: "-javaagent:/app/libs/opentelemetry-javaagent.jar"

  spring:
    profile: default   # overridden to "dev" by environments/dev.yaml

  ports:
    configserver: 8801

  eureka:
    hostname: eurekaserver
    url: http://eurekaserver:8761/eureka/

# ── Secret defaults (overridable per environment) ────────────────────────────
# For production, swap these out with sealed-secrets or an external vault.
globalSecrets:
  mysql:
    rootPassword: "root"
  keycloak:
    dbPassword: "keycloak"
    adminPassword: "admin"

# ── Observability defaults (NodePort overrides live in environments/dev.yaml) ─
prometheus:
  service:
    type: ClusterIP
    ports:
      - port: 9090
        targetPort: 9090

loki:
  service:
    type: ClusterIP
    ports:
      - port: 3100
        targetPort: 3100

tempo:
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 3100
        targetPort: 3100
      - name: otlp-http
        port: 4318
        targetPort: 4318

alloy:
  service:
    type: ClusterIP
    ports:
      - port: 12345
        targetPort: 12345

grafana:
  service:
    type: ClusterIP
    ports:
      - port: 3000
        targetPort: 3000
