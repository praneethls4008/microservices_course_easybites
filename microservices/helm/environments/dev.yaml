global:
  spring:
    profile: default   # ← activates Spring "dev" profile on localhost

eurekaserver:
  service:
    type: NodePort
    ports:
      - port: 8761
        targetPort: 8761
        nodePort: 30061

gatewayserver:
  service:
    type: NodePort
    ports:
      - port: 8901
        targetPort: 8901
        nodePort: 30001

keycloak:
  service:
    type: NodePort
    ports:
      - port: 8080
        targetPort: 8080
        nodePort: 30080

keycloak-ui:
  service:
    type: NodePort
    ports:
      - port: 8080
        targetPort: 8080
        nodePort: 30081

# Expose configserver locally for debugging config
configserver:
  service:
    type: NodePort
    ports:
      - port: 8801
        targetPort: 8801
        nodePort: 30801

# ── Observability: expose Grafana + Prometheus locally ────────────────────────
grafana:
  service:
    type: NodePort
    ports:
      - port: 3000
        targetPort: 3000
        nodePort: 30300

prometheus:
  service:
    type: NodePort
    ports:
      - port: 9090
        targetPort: 9090
        nodePort: 30909
