server:
  port: ${PORT_ACCOUNTS:40001}

spring:
  application:
    name: "accounts"
  config:
    # Points to the 'configserver' service name defined in docker-compose
    import: "optional:configserver:http://configserver:${PORT_CONFIGSERVER:8801}"
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  datasource:
    # Uses the specific URL provided by the Docker Compose environment
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/accountsdb}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        # Prevents the metadata extractor from crashing on MySQL
        temp:
          use_jdbc_metadata_defaults: false
        id:
          db_structure_naming_strategy: legacy
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: "refresh,bus-refresh,health,info"
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8070/eureka/}

info:
  app:
    name: "accounts"
    description: "Accounts application"
    version: "1.0.0"

resilience4j:

  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 100ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        ignoreExceptions:
          - java.lang.NullPointerException
        retryExceptions:
          - java.util.concurrent.TimeoutException

  ratelimiter:
    configs:
      default:
        timeoutDuration: 1s
        limitRefreshPeriod: 5s
        limitForPeriod: 1

  thread-pool-bulkhead:
    configs:
      default:
        coreThreadPoolSize: 3
        maxThreadPoolSize: 7
        queueCapacity: 4

    instances:
      fetchDataBulkhead:
        baseConfig: default